<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/ui/manifest.webmanifest">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="theme-color" content="#0d6efd">
  <title>Płatności — przelewy</title>
  <link rel="stylesheet" href="/ui/static/style.css">
</head>
<body>

<header class="app-header">
  <button class="btn-icon" id="btn-back" title="Wstecz" style="font-size:20px;">←</button>
  <h1>Przelewy bankowe</h1>
  <div class="header-actions">
    <label class="btn-icon" for="file-input" title="Importuj CSV" style="font-size:18px;cursor:pointer">⬆</label>
    <input type="file" id="file-input" accept=".csv,text/csv" style="display:none">
  </div>
</header>

<main class="main-content">

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label for="filter-status">Status</label>
      <select id="filter-status">
        <option value="">Wszystkie</option>
        <option value="unmatched">Bez dopasowania</option>
        <option value="manual_review">Do przeglądu</option>
        <option value="partial">Częściowe</option>
        <option value="matched">Dopasowane</option>
      </select>
    </div>
    <div class="filter-group" style="flex:0 0 auto">
      <label>&nbsp;</label>
      <button class="btn btn-primary" id="btn-search">Szukaj</button>
    </div>
  </div>

  <div id="list-container">
    <div class="state-loading">Ładowanie</div>
  </div>

  <div class="pagination" id="pagination" style="display:none">
    <span id="pag-info"></span>
    <div class="pagination-btns">
      <button class="btn btn-outline" id="btn-prev">‹ Poprzednia</button>
      <button class="btn btn-outline" id="btn-next">Następna ›</button>
    </div>
  </div>
</main>

<script type="module">
  import {
    requireAuth, api,
    badgeHtml, escHtml, formatMoney,
    showToast, setError,
  } from "/ui/static/app.js";

  requireAuth();

  document.getElementById("btn-back").addEventListener("click", () => history.back());

  let currentPage = 1;
  const PAGE_SIZE = 50;

  /* ---- CSV Import ---- */
  document.getElementById("file-input").addEventListener("change", async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const fd = new FormData();
    fd.append("file", file);
    try {
      const result = await api.importPaymentsCsv(fd);
      showToast(
        `Zaimportowano: ${result.imported}, pominięto: ${result.skipped}, auto: ${result.auto_matched}, do przeglądu: ${result.manual_review}`,
        "success",
        6000
      );
      currentPage = 1;
      loadTransactions();
    } catch (err) {
      showToast("Błąd importu: " + err.message, "error");
    }
    e.target.value = "";
  });

  document.getElementById("btn-search").addEventListener("click", () => {
    currentPage = 1;
    loadTransactions();
  });

  /* ---- Pagination ---- */
  let totalItems = 0;

  document.getElementById("btn-prev").addEventListener("click", () => {
    if (currentPage > 1) { currentPage--; loadTransactions(); }
  });
  document.getElementById("btn-next").addEventListener("click", () => {
    if (currentPage * PAGE_SIZE < totalItems) { currentPage++; loadTransactions(); }
  });

  /* ---- Load ---- */
  async function loadTransactions() {
    const container = document.getElementById("list-container");
    container.innerHTML = `<div class="state-loading">Ładowanie</div>`;

    const matchStatus = document.getElementById("filter-status").value || null;

    let data;
    try {
      data = await api.listTransactions({ match_status: matchStatus ?? undefined, page: currentPage, size: PAGE_SIZE });
    } catch (err) {
      setError(container, err.message);
      return;
    }

    totalItems = data.total;
    const items = data.items ?? [];
    const pagEl = document.getElementById("pagination");
    const pagInfo = document.getElementById("pag-info");

    if (items.length === 0) {
      container.innerHTML = `<div class="state-empty">Brak transakcji spełniających kryteria.</div>`;
      pagEl.style.display = "none";
      return;
    }

    pagEl.style.display = "flex";
    const from = (currentPage - 1) * PAGE_SIZE + 1;
    const to = Math.min(currentPage * PAGE_SIZE, totalItems);
    pagInfo.textContent = `${from}–${to} z ${totalItems}`;
    document.getElementById("btn-prev").disabled = currentPage === 1;
    document.getElementById("btn-next").disabled = to >= totalItems;

    container.innerHTML = `<div class="card">${items.map(renderTxRow).join("")}</div>`;

    // Bind match buttons
    container.querySelectorAll("[data-match-tx]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const txId = btn.dataset.matchTx;
        btn.disabled = true;
        btn.textContent = "…";
        try {
          const res = await api.rematchTransaction(txId);
          showToast(`Wynik: ${res.outcome}`, "success");
          loadTransactions();
        } catch (err) {
          showToast("Błąd: " + err.message, "error");
          btn.disabled = false;
          btn.textContent = "Matching";
        }
      });
    });
  }

  function renderTxRow(tx) {
    const remaining = parseFloat(tx.remaining_amount ?? tx.amount);
    const total = parseFloat(tx.amount);
    const pct = total > 0 ? Math.round((1 - remaining / total) * 100) : 0;
    return `
      <div class="tx-row">
        <div class="tx-row-info">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <strong>${escHtml(tx.transaction_date)}</strong>
            ${badgeHtml(tx.match_status)}
          </div>
          <div class="tx-row-title" title="${escHtml(tx.title ?? "")}">${escHtml(tx.title ?? "—")}</div>
          <div class="tx-row-title">${escHtml(tx.counterparty_name ?? "—")}</div>
          ${pct > 0 ? `<div style="font-size:11px;color:var(--color-muted);margin-top:2px">Przypisano: ${pct}%</div>` : ""}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="tx-row-amount">${formatMoney(tx.amount, tx.currency)}</span>
          ${tx.remaining_amount !== tx.amount
            ? `<span style="font-size:12px;color:var(--color-muted)">Pozostało: ${formatMoney(tx.remaining_amount, tx.currency)}</span>`
            : ""}
          ${["unmatched","manual_review","partial"].includes(tx.match_status)
            ? `<button class="btn btn-outline" style="font-size:12px;padding:4px 10px" data-match-tx="${escHtml(tx.id)}">Matching</button>`
            : ""}
        </div>
      </div>`;
  }

  loadTransactions();
</script>
</body>
</html>
