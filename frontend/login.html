<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/ui/manifest.webmanifest">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="theme-color" content="#0d6efd">
  <title>Logowanie — Faktury</title>
  <link rel="stylesheet" href="/ui/static/style.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <h2>📄 Faktury KSeF</h2>
    <form id="login-form" autocomplete="on" novalidate>
      <div class="form-group">
        <label for="username">Nazwa użytkownika</label>
        <input type="text" id="username" name="username" autocomplete="username"
               required placeholder="admin" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Hasło</label>
        <input type="password" id="password" name="password" autocomplete="current-password"
               required placeholder="••••••••">
      </div>
      <div id="login-error" style="color:#dc3545;font-size:13px;margin-bottom:10px;display:none;"></div>
      <button type="submit" class="btn btn-primary login-submit" id="btn-submit">
        Zaloguj się
      </button>
    </form>
  </div>
</div>

<script type="module">
  import { getToken, saveToken, showToast } from "/ui/static/app.js";

  /* Redirect if already authenticated */
  if (getToken()) {
    window.location.replace("/ui/");
  }

  const API_BASE = "/api/v1";
  const form = document.getElementById("login-form");
  const btnSubmit = document.getElementById("btn-submit");
  const errorEl = document.getElementById("login-error");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorEl.style.display = "none";
    btnSubmit.disabled = true;
    btnSubmit.textContent = "Logowanie…";

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    try {
      const res = await fetch(`${API_BASE}/auth/token`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });

      if (res.status === 401 || res.status === 400) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || "Nieprawidłowe dane logowania.");
      }

      if (!res.ok) {
        throw new Error(`Błąd serwera: HTTP ${res.status}`);
      }

      const data = await res.json();
      saveToken(data.access_token, true);
      window.location.replace("/ui/");
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = "block";
    } finally {
      btnSubmit.disabled = false;
      btnSubmit.textContent = "Zaloguj się";
    }
  });
</script>
</body>
</html>
